持措施\\n  - 公司/管理者提供的资源\\n  - 培训安排\\n  - 辅导频率\\n\\n## 4. 检查节点\\n  - 周度检查内容\\n  - 中期评估标准\\n  - 最终评估标准\\n\\n## 5. 结果说明\\n  - 达标：恢复正常管理\\n  - 未达标：后续处理方式\\n\\n语气客观专业，体现对员工的尊重和支持。\"}]},{\"id\":\"performance-chatgpt\",\"name\":\"腾讯元宝\",\"description\":\"适合汇总360反馈、提炼共性问题和行动建议\",\"category\":\"AI对话\",\"tags\":[\"360评估\",\"反馈分析\"],\"url\":\"https://yuanbao.tencent.com/\",\"prompts\":[{\"title\":\"360评估结果分析\",\"content\":\"你是一位组织行为学专家。请对以下360度评估数据进行深度分析。\\n\\n【评估数据】\\n- 被评估人：{{employee_name}}\\n- 岗位级别：{{level}}\\n\\n| 评估维度 | 自评 | 上级 | 同事 | 下属 |\\n|---------|------|------|------|------|\\n{{evaluation_data}}\\n\\n【分析要求】\\n1. 各维度得分雷达图描述\\n2. 自评与他评差异分析（盲点/隐藏区）\\n3. 核心优势识别（Top3）\\n4. 发展领域识别（Bottom3）\\n5. 上级与同事/下属视角差异\\n6. Johari窗模型分析\\n7. 个性化发展建议（3-5条具体行动）\\n\\n以管理咨询报告风格输出，数据与洞察并重。\"},{\"title\":\"团队绩效对比分析\",\"content\":\"你是一位人力资源数据分析师。请对团队绩效数据进行对比分析。\\n\\n【团队数据】\\n- 部门：{{department}}\\n- 考核周期：{{period}}\\n- 团队绩效分布：{{performance_distribution}}\\n\\n【分析内容】\\n1. 绩效分布合理性分析（是否符合正态分布）\\n2. 同比/环比变化趋势\\n3. 高绩效员工共同特征\\n4. 低绩效员工问题诊断\\n5. 团队能力矩阵（九宫格）\\n6. 人才风险预警（流失风险/能力短板）\\n7. 管理者绩效评价倾向分析（宽松/严格/趋中）\\n\\n【输出格式】\\n- 数据表格 + 关键发现 + 行动建议\\n- 为管理者提供3条可落地的团队提升建议\"}]},{\"id\":\"performance-feishu-bitable\",\"name\":\"飞书多维表格\",\"description\":\"搭建可视化绩效数据看板，实时追踪团队表现\",\"category\":\"效率工具\",\"tags\":[\"数据看板\",\"可视化\"],\"url\":\"https://www.feishu.cn/product/bitable\",\"prompts\":[{\"title\":\"绩效看板设计方案\",\"content\":\"你是一位数据可视化专家。请设计一套绩效管理数据看板。\\n\\n【看板需求】\\n- 使用场景：{{use_case}}（HR总览/部门管理者/HRBP）\\n- 数据源：{{data_sources}}\\n- 更新频率：{{update_frequency}}\\n\\n【看板设计】\\n\\n### 核心指标卡片（顶部）\\n| 指标名 | 计算方式 | 展示形式 | 预警规则 |\\n|--------|---------|---------|---------|\\n\\n### 图表区域\\n1. 绩效分布图（柱状图/饼图）\\n2. 趋势图（折线图）\\n3. 部门对比图（横向柱状图）\\n4. 人才九宫格（散点图）\\n5. OKR完成率仪表盘\\n\\n### 明细表\\n- 字段定义\\n- 筛选条件\\n- 排序规则\\n\\n### 多维表格字段设计\\n列出所有需要的字段、字段类型和选项值。\"},{\"title\":\"OKR追踪表模板\",\"content\":\"你是一位OKR教练。请设计一份多维表格版的OKR追踪模板。\\n\\n【适用范围】\\n- 组织层级：{{org_level}}（公司/部门/个人）\\n- 考核周期：{{period}}\\n\\n【表格设计】\\n\\n## 字段列表\\n| 字段名 | 类型 | 说明 | 选项/公式 |\\n|--------|------|------|----------|\\n| O（目标）| 文本 | 目标描述 | - |\\n| KR（关键结果）| 文本 | 可衡量的结果 | - |\\n| 负责人 | 人员 | - | - |\\n| 进度 | 进度条 | 0-100% | - |\\n| 信心指数 | 单选 | 完成把握 | 🟢高/🟡中/🔴低 |\\n| 状态 | 单选 | 当前状态 | 进行中/已完成/有风险/已放弃 |\\n| 周更新 | 长文本 | 本周进展 | - |\\n| 截止日期 | 日期 | - | - |\\n\\n## 视图设计\\n1. 看板视图：按状态分组\\n2. 甘特图视图：按时间线展示\\n3. 表格视图：完整数据\\n\\n## 自动化规则\\n列出3-5条自动提醒规则。\"}]},{\"id\":\"performance-kimi\",\"name\":\"Kimi\",\"description\":\"长文绩效报告生成，支持多维度数据整合分析\",\"category\":\"AI对话\",\"tags\":[\"报告生成\",\"综合分析\"],\"url\":\"https://kimi.moonshot.cn\",\"prompts\":[{\"title\":\"季度绩效总结报告\",\"content\":\"你是一位HRBP。请根据以下数据生成季度绩效总结报告。\\n\\n【报告信息】\\n- 部门：{{department}}\\n- 考核周期：{{quarter}}\\n- 关键数据：{{key_metrics}}\\n\\n【报告结构】\\n\\n# {{department}} {{quarter}} 绩效总结报告\\n\\n## 执行摘要（200字）\\n\\n## 1. 整体绩效概况\\n  - 绩效等级分布\\n  - 目标完成率\\n  - 同比/环比变化\\n\\n## 2. 亮点与成就\\n  - Top Performer表彰\\n  - 优秀案例\\n\\n## 3. 问题与挑战\\n  - 绩效短板分析\\n  - 根因分析\\n\\n## 4. 人才盘点\\n  - 九宫格分布\\n  - 高潜人才识别\\n  - 流失风险预警\\n\\n## 5. 改进计划\\n  - 组织层面\\n  - 个人层面\\n\\n## 6. 下季度重点工作\\n\\n数据驱动，结论清晰，可直接呈报管理层。\"},{\"title\":\"年度绩效校准会议材料\",\"content\":\"你是一位绩效管理专家。请准备年度绩效校准会议的材料。\\n\\n【会议信息】\\n- 参会人：{{participants}}\\n- 校准范围：{{scope}}\\n- 预分布要求：{{distribution}}\\n\\n【材料内容】\\n\\n## 1. 会议议程\\n  - 时间安排\\n  - 讨论流程\\n  - 决策规则\\n\\n## 2. 校准原则\\n  - 评估标准一致性要求\\n  - 常见偏差及纠正方法\\n  - 争议处理机制\\n\\n## 3. 数据包\\n  - 各团队初始评级分布\\n  - 历史绩效趋势\\n  - 需重点讨论的案例\\n\\n## 4. 讨论模板\\n  - 每位员工的讨论框架（2分钟版本）\\n  - 记录模板\\n\\n## 5. 会后行动清单\\n\\n格式清晰，重点突出，方便会议中快速参考。\"}]}]}}],null],null],null]},[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"scene\",\"children\",\"$8\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\"}]],null]},[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"segmentPa
